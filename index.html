<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Jeremy Frieser – YouTube Channel</title>
<style>
/* Reset & Global */
* {margin:0; padding:0; box-sizing:border-box; font-family: 'Arial', sans-serif;}
body {background:#0f0f0f; color:#fff; line-height:1.6;}
a {text-decoration:none; color:#ff0000;}
.container {max-width:1200px; margin:0 auto; padding:0 20px;}

/* Header / Nav */
header {padding:20px 0; text-align:center; background:#111; border-bottom:1px solid #222;}
header h1 {color:#ff0000; font-size:2.5rem;}

/* Hero */
.hero {text-align:center; padding:80px 20px;}
.hero h2 {font-size:2.5rem; margin-bottom:10px;}
.hero p {opacity:0.7; margin-bottom:20px;}
.btn-subscribe {background:#ff0000; color:#fff; padding:12px 25px; border:none; border-radius:6px; font-size:16px; cursor:pointer; transition:0.3s;}
.btn-subscribe:hover {background:#cc0000;}

/* Video Grid */
.videos {padding:40px 20px;}
.videos h2 {text-align:center; margin-bottom:30px; font-size:2rem;}
.video-grid {display:grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); gap:20px;}
.video-card {background:#1a1a1a; border-radius:12px; overflow:hidden; transition:0.3s;}
.video-card:hover {transform:scale(1.03);}
.video-card img {width:100%; display:block;}
.video-card h3 {padding:10px; font-size:1rem; text-align:center;}

/* About Section */
.about {padding:40px 20px; text-align:center; background:#111;}
.about h2 {margin-bottom:20px; font-size:2rem;}

/* Footer */
footer {padding:20px; text-align:center; opacity:0.5; border-top:1px solid #222;}

/* Responsive */
@media(max-width:600px){.hero h2{font-size:2rem;}.videos h2,.about h2{font-size:1.5rem;}}
</style>
</head>
<body>

<header>
    <h1>Jeremy Frieser</h1>
</header>

<section class="hero">
    <h2>Welkom op mijn YouTube kanaal 🎬</h2>
    <p>Bekijk mijn nieuwste video's en content hier</p>
    <button class="btn-subscribe" onclick="window.open('https://www.youtube.com/@jeremyfrieser','_blank')">Subscribe</button>
</section>

<section class="videos container">
    <h2>📺 Laatste video's</h2>
    <div class="video-grid" id="videoGrid">
        <!-- Video cards will be injected here by JavaScript -->
    </div>
</section>

<section class="about">
    <h2>👤 Over Jeremy</h2>
    <p>Ik ben Jeremy Frieser, YouTuber. Hier vind je mijn content, video's en updates. Abonneer je voor de nieuwste uploads!</p>
</section>

<footer>
    © 2026 Jeremy Frieser
</footer>

<script>
/* ====== YouTube Data API - Fetch latest videos ====== */
const API_KEY = 'YOUR_YOUTUBE_API_KEY'; // Replace with your YouTube API key
const CHANNEL_ID = 'UC7s8O3lUtn2l-jR0wKkh_mA'; // Jeremy Frieser's channel ID
const MAX_RESULTS = 4;

async function fetchLatestVideos() {
    const res = await fetch(`https://www.googleapis.com/youtube/v3/search?key=${API_KEY}&channelId=${CHANNEL_ID}&part=snippet,id&order=date&maxResults=${MAX_RESULTS}`);
    const data = await res.json();
    const grid = document.getElementById('videoGrid');
    grid.innerHTML = '';

    data.items.forEach(video => {
        if(video.id.kind === 'youtube#video'){
            const videoId = video.id.videoId;
            const title = video.snippet.title;
            const thumbnail = video.snippet.thumbnails.high.url;

            const card = document.createElement('div');
            card.className = 'video-card';
            card.innerHTML = `
                <a href="https://www.youtube.com/watch?v=${videoId}" target="_blank">
                    <img src="${thumbnail}" alt="${title}">
                    <h3>${title}</h3>
                </a>
            `;
            grid.appendChild(card);
        }
    });
}

fetchLatestVideos();
</script>

</body>
</html>
