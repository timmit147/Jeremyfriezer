<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Jeremy Friezer</title>

<style>
body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: #0f0f0f;
    color: white;
}

/* NAV */
nav {
    display: flex;
    justify-content: space-between;
    padding: 15px 20px;
    background: #111;
    border-bottom: 1px solid #222;
}

nav h1 {
    color: #ff0000;
}

nav a {
    color: white;
    text-decoration: none;
    margin-left: 15px;
}

/* HERO */
.hero {
    text-align: center;
    padding: 80px 20px;
}

.hero h2 {
    font-size: 2.5rem;
}

.hero p {
    opacity: 0.7;
}

.subscribe-btn {
    margin-top: 20px;
    padding: 12px 25px;
    background: #ff0000;
    border: none;
    color: white;
    font-size: 16px;
    border-radius: 6px;
    cursor: pointer;
}

.subscribe-btn:hover {
    background: #cc0000;
}

/* VIDEOS */
.videos {
    padding: 40px 20px;
}

.video-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
    gap: 20px;
}

.video {
    background: #1a1a1a;
    padding: 10px;
    border-radius: 10px;
}

.video iframe {
    width: 100%;
    height: 150px;
    border-radius: 8px;
}

/* ABOUT */
.about {
    padding: 40px 20px;
    text-align: center;
}

/* FOOTER */
footer {
    text-align: center;
    padding: 20px;
    opacity: 0.5;
}
</style>
</head>

<body>

<nav>
    <h1>Jeremy Friezer</h1>
    <div>
        <a href="#videos">Videos</a>
        <a href="#about">About</a>
    </div>
</nav>

<section class="hero">
    <h2>Welkom op mijn kanaal 🔥</h2>
    <p>Bekijk mijn nieuwste video's en content</p>
    <button class="subscribe-btn" onclick="subscribe()">Subscribe</button>
</section>

<section id="videos" class="videos">
    <h2>📺 Laatste video's</h2>

    <div class="video-grid">
        <div class="video">
            <iframe src="https://www.youtube.com/embed/VIDEO_ID"></iframe>
            <p>Video titel 1</p>
        </div>

        <div class="video">
            <iframe src="https://www.youtube.com/embed/VIDEO_ID"></iframe>
            <p>Video titel 2</p>
        </div>

        <div class="video">
            <iframe src="https://www.youtube.com/embed/VIDEO_ID"></iframe>
            <p>Video titel 3</p>
        </div>
    </div>
</section>

<section id="about" class="about">
    <h2>👤 Over mij</h2>
    <p>Ik ben Jeremy Friezer, YouTuber. Hier vind je mijn content, video's en updates.</p>
</section>

<footer>
    © 2026 Jeremy Friezer
</footer>

<script>
function subscribe() {
    window.open("https://www.youtube.com/", "_blank");
}
</script>

</body>
</html>
